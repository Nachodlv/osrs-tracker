name: Claude

# On-demand Claude Code runs. Mention "@claude" in an issue body, an issue
# comment, or a PR review comment and Claude picks up the thread, makes the
# change on a branch, runs the tests, and opens a draft PR. Intended for the
# template-drift issues opened by crawl-ladlor.yml: comment "@claude wire these
# new goals into data.js" and it adds them with the right icons/links.
#
# Auth uses a Claude subscription OAuth token (works on Pro/Max), not a metered
# API key. Generate it locally with `claude setup-token` and store it as the
# CLAUDE_CODE_OAUTH_TOKEN repo secret.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Comment-only triggers keep this strictly on-demand: Claude never runs just
# because an issue was opened (so the crawl issue can print a "comment @claude"
# hint without self-triggering). It runs only when a *comment* mentions @claude.
jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # --max-turns bounds each run. The default tool set is read-only + git;
          # grant Edit/Write and node so Claude can actually change data.js,
          # regenerate the template, and run the test suites.
          claude_args: >-
            --max-turns 40
            --allowedTools "Edit,Write,MultiEdit,Bash(node:*)"
